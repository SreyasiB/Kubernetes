apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: secure-deploy
  name: hello-app-reader
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]

- apiGroups: [""]
  resources:
  - pods
  - pods/log
  - events
  verbs:
  - get
  - list

- apiGroups: ["apps"]
  resources:
  - deployments
  - replicasets
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hello-app-reader-binding
  namespace: secure-deploy
subjects:
- kind: ServiceAccount
  name: app-ksa
  namespace: secure-deploy
roleRef:
  kind: Role
  name: hello-app-reader
  apiGroup: rbac.authorization.k8s.io